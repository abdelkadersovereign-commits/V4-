name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Clean Gradle Cache (prevents stale cache issues)
      run: |
        rm -rf ~/.gradle/caches
        rm -rf ~/.gradle/wrapper/dists
        echo "Gradle cache cleared."

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.7
        cache-disabled: false
        cache-overwrite-existing: true

    - name: Generate Gradle Wrapper if Missing
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper --gradle-version 8.7
        fi
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-configuration-cache --stacktrace --refresh-dependencies
      env:
        GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: A_SYRIA_V4_FINAL
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
